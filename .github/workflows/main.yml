name: Flask CI (Integração Contínua)

# O fluxo roda a cada push ou pull request na branch principal
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-verify:
    runs-on: ubuntu-latest # Sistema operacional da máquina virtual

    steps:
      # Passo 1: Baixa o código do seu repositório para a máquina do GitHub
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      # Passo 2: Instala o Python na máquina virtual
      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Coloque a versão do Python que você está usando
          cache: 'pip' # Ativa o cache para instalar as próximas vezes muito mais rápido

      # Passo 3: Atualiza o pip e instala as dependências do requirements.txt
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Passo 4: Rodar testes automatizados (Se você usar pytest ou unittest)
      # Se você não tiver testes ainda, pode deixar essa parte comentada com #
      - name: Rodar testes com Pytest
        run: |
          pip install pytest # Garante que o pytest está instalado para o teste
          pytest

      # Passo 5: Validar a sintaxe do código (Opcional - evita erros bobos de digitação)
      - name: Verificar erros de sintaxe (Linting)
        run: |
          pip install flake8
          # Para o build se houver erros de sintaxe Python
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
