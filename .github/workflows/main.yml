# .github/workflows/main.yml
name: Deploy Web App to Azure

on:
  push:
    branches:
      - main  # O pipeline roda sempre que você der push na branch main
  workflow_dispatch: # Permite rodar o pipeline manualmente pelo GitHub

env:
  AZURE_WEBAPP_NAME: FloodPrev # COLOQUE O NOME DO SEU WEB APP AQUI
  PYTHON_VERSION: '3.11'                  # COLOQUE A VERSÃO QUE VOCÊ USOU (3.9 ou 3.11)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do código do repositório
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configura o ambiente Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # 3. Instala as dependências (Flask, gunicorn, etc)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Login no Azure usando o segredo que você vai criar no GitHub
      - name: 'Login to Azure'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 5. Deploy para o Azure Web App
      - name: 'Deploy to Azure WebApp'
        uses: azure/webapp-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: .
