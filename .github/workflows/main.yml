name: Deploy Web App to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Permissões obrigatórias para autenticação OIDC (Segurança DevSecOps)
permissions:
  id-token: write
  contents: read

env:
  AZURE_WEBAPP_NAME: 'FloodPrev'            # Nome exato do seu App Service na Azure
  AZURE_WEBAPP_PACKAGE_PATH: '.'            # Raiz do projeto Flask
  PYTHON_VERSION: '3.11'                     # Versão do Python utilizada

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python version
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: 'Login to Azure via OIDC'
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: 'Deploy to Azure WebApp'
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
