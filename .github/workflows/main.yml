name: Deploy Web App to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: 'FloodPrev'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python version
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Zip application
      run: zip -r deploy.zip . -x "*.git*" ".github*"

    - name: Deploy to Azure WebApp via GitHub Token
      run: |
        curl -X POST -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
        https://@${{ env.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net/api/zipdeploy \
        --data-binary @deploy.zip
